version: "3.9"

services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: stream_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stream_db}
      POSTGRES_USER: ${POSTGRES_USER:-stream_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stream_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stream_user} -d ${POSTGRES_DB:-stream_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream_network

  # Redis Service (Task Broker & Cache)
  redis:
    image: redis:7-alpine
    container_name: stream_redis
    command: redis-server --appendonly yes  # Veri kaybını önlemek için AOF açık
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stream_network

  worker:
    build: ./backend
    container_name: stream_worker
    command: arq worker.WorkerSettings
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - stream_network

  # FastAPI Backend Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stream_api
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stream_user}:${POSTGRES_PASSWORD:-stream_password}@db:5432/${POSTGRES_DB:-stream_db}
      REDIS_URL: redis://redis:6379/0
      DATABASE_ECHO: ${DATABASE_ECHO:-True}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your-cloud-name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your-api-key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your-api-secret}
      ADMIN_EMAILS: ${ADMIN_EMAILS:- ozzencben@gmail.com}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - stream_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  stream_network:
    driver: bridge